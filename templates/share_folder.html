<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ .filename }} - TeleCloud Share</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/fontawesome.min.css?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/plyr.min.css?v={{ .version }}" />
    <script src="/static/js/plyr.polyfilled.js?v={{ .version }}"></script>
    <link rel="stylesheet" href="/static/css/prism.min.css?v={{ .version }}">
    <script src="/static/js/prism.min.js?v={{ .version }}"></script>
    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">

    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script>TeleCloud.version = '{{ .version }}';</script>
    <script src="/static/js/script.min.js?v={{ .version }}"></script>
    <script defer src="/static/js/alpine-collapse.min.js?v={{ .version }}"></script>
    <script defer src="/static/js/alpine.min.js?v={{ .version }}"></script>

    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Shared Folder: {{ .filename }}">
    <meta property="og:title" content="{{ .filename }} - TeleCloud Share">
    <meta property="og:description" content="View and download files from this shared folder.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/static/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ .filename }} - TeleCloud Share">
    <meta name="twitter:description" content="View and download files from this shared folder.">
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 h-full relative overflow-hidden flex flex-col transition-colors duration-500"
    data-theme="system"
    x-data="shareApp('{{ .token }}')">

    <div class="blob-1"></div>
    <div class="blob-2"></div>



    <div x-show="contextMenu.show" x-cloak @click.outside="closeContextMenu" @contextmenu.prevent="closeContextMenu"
        :style="`top: ${contextMenu.y}px; left: ${contextMenu.x}px;`"
        class="fixed glass-menu z-[100] w-52 rounded-2xl p-1.5 text-sm shadow-2xl" x-transition.opacity.duration.200ms>
        <template x-if="contextMenu.file">
            <div>
                <template x-if="!contextMenu.file.is_folder">
                    <button @click="startDownload(contextMenu.file.id); closeContextMenu()"
                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors">
                        <i class="fa-solid fa-download fa-fw text-slate-400"></i> <span x-text="t('download')"></span>
                    </button>
                </template>
            </div>
        </template>
    </div>

    <div x-show="fileInfoModal.show" x-cloak
        class="fixed inset-0 z-[250] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
        x-transition.opacity>
        <div @click.outside="closeFileInfoModal()"
            class="glass-menu w-[90%] max-h-[90vh] overflow-y-auto hide-scrollbar rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 transition-all duration-300"
            :class="fileInfoModal.isLarge ? 'modal-wide' : 'max-w-sm'">

            <div class="flex items-start gap-4 mb-2">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner shrink-0 transition-colors overflow-hidden relative"
                    :class="fileInfoModal.bgColor">
                    <template x-if="fileInfoModal.file?.has_thumb">
                        <img :src="`/s/${shareToken}/file/${fileInfoModal.file.id}/thumb`"
                            class="w-full h-full object-cover absolute inset-0 z-10">
                    </template>
                    <template x-if="!fileInfoModal.file?.has_thumb">
                        <div x-html="fileInfoModal.svgIcon"></div>
                    </template>
                </div>
                <div class="flex-1 min-w-0 pt-1">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white truncate"
                        x-text="fileInfoModal.file?.filename" :title="fileInfoModal.file?.filename"></h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-0.5"
                        x-text="t(fileInfoModal.typeName) + (fileInfoModal.ext ? ' (' + fileInfoModal.ext + ')' : '')"></p>
                </div>

                <button @click="closeFileInfoModal()"
                    class="p-1.5 text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div x-show="fileInfoModal.isMedia"
                class="w-full mt-4 mb-2 flex flex-col items-center justify-center transition-all"
                x-html="fileInfoModal.mediaHtml"></div>

            <div x-show="fileInfoModal.needsLoad" class="w-full mt-4 mb-2">
                <div
                    class="w-full p-6 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-800/30 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
                    <i class="fa-solid fa-file-lines text-4xl text-slate-300 dark:text-slate-600 mb-3"></i>
                    <p class="text-sm text-slate-500 mb-4 text-center" x-text="t('preview_manual')"></p>
                    <button @click="loadFilePreview()"
                        class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                        <span x-text="t('load_preview')"></span>
                    </button>
                </div>
            </div>

            <div x-show="fileInfoModal.tooLarge" class="w-full mt-4 mb-2">
                <div
                    class="w-full p-6 flex flex-col items-center justify-center bg-red-50 dark:bg-red-500/10 rounded-2xl border border-dashed border-red-200 dark:border-red-500/30">
                    <i class="fa-solid fa-file-circle-exclamation text-4xl text-red-400 mb-3"></i>
                    <p class="text-sm text-red-600 dark:text-red-400 mb-4 text-center" x-text="t('preview_blocked')">
                    </p>
                    <a :href="fileInfoModal.file ? '/download/' + fileInfoModal.file.id : '#'"
                        class="px-6 py-2 bg-red-500 hover:bg-red-600 text-white rounded-xl text-sm font-semibold transition-all shadow-lg shadow-red-500/20 active:scale-95">
                        <i class="fa-solid fa-download mr-2"></i><span x-text="t('download')"></span>
                    </a>
                </div>
            </div>

            <div x-show="fileInfoModal.isPreviewLoading"
                class="w-full mt-6 mb-4 flex flex-col items-center justify-center py-10">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500 mb-3"></i>
                <p class="text-sm text-slate-500" x-text="t('loading_preview')"></p>
            </div>

            <div
                class="space-y-3 mt-5 bg-white/50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700/50">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('size') + ':'"></span>
                    <span class="font-semibold text-slate-800 dark:text-slate-200"
                        x-text="formatBytes(fileInfoModal.file?.size)"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('date') + ':'"></span>
                    <span class="font-semibold text-slate-800 dark:text-slate-200"
                        x-text="formatDate(fileInfoModal.file?.created_at)"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('status') + ':'"></span>
                    <span class="font-semibold text-emerald-600 dark:text-emerald-400" x-text="t('public')"></span>
                </div>
            </div>

            <p class="text-center text-[10px] text-slate-400 dark:text-slate-500 mt-4 flex items-center justify-center gap-1.5 opacity-70">
                <i class="fa-solid fa-shield-halved text-emerald-500 text-xs"></i>
                <span x-text="t('safe_msg')"></span>
            </p>

            <div class="mt-4 flex flex-col gap-1.5">
                <button @click="startDownload(fileInfoModal.file?.id); closeFileInfoModal()"
                    class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-medium shadow-lg shadow-blue-500/25 transition-transform active:scale-95">
                    <i class="fa-solid fa-download"></i> <span x-text="t('download')"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 flex flex-col w-full z-10 p-0 md:p-4 md:pb-0 overflow-hidden">
        <main class="flex-1 flex flex-col h-full min-h-0 glass-panel md:rounded-[2rem] relative overflow-hidden"
            @contextmenu.prevent="if(event.target === $el) openContextMenu(event, null)">
            <header
                class="flex items-center justify-between p-3 md:px-6 md:py-4 border-b border-slate-200 dark:border-white/5 bg-white/30 dark:bg-slate-900/30 gap-4 shrink-0 relative z-[200]">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-cloud text-blue-600 dark:text-blue-400 text-2xl"></i>
                        <span class="font-bold text-lg sm:block" x-text="'{{ .filename }}'"></span>
                    </div>
                </div>
                <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                    <!-- Language Dropdown -->
                    <div class="relative z-[110]" x-data="{ open: false }">
                        <button @click="open = !open" @click.outside="open = false"
                            class="h-9 sm:h-10 px-2 sm:px-3 flex items-center gap-2 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-transparent hover:border-blue-100 dark:hover:border-blue-900 transition-colors">
                            <i class="fa-solid fa-earth-americas text-base sm:text-lg"></i>
                            <span class="text-xs sm:text-sm font-bold uppercase" x-text="lang"></span>
                        </button>
                        <div x-show="open" x-cloak
                            class="absolute top-12 right-0 w-36 glass-menu rounded-xl shadow-xl border border-white/20 p-1.5 z-[1000]"
                            x-transition:enter="transition ease-out duration-100"
                            x-transition:enter-start="transform opacity-0 scale-95"
                            x-transition:enter-end="transform opacity-100 scale-100">
                            <template x-for="l in TeleCloud.availableLangs" :key="l.code">
                                <button @click="setLang(l.code); open = false"
                                    class="w-full text-left px-3 py-2.5 rounded-lg text-xs sm:text-sm font-medium transition-colors flex items-center justify-between"
                                    :class="lang === l.code ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'">
                                    <span x-text="l.name"></span>
                                    <span x-text="l.flag" class="text-lg"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </header>
            <div x-show="currentTab === 'files'"
                class="flex items-center justify-between px-3 md:px-6 py-2 border-b border-slate-200 dark:border-white/5 bg-white/10 dark:bg-slate-900/10 gap-2 overflow-x-auto hide-scrollbar shrink-0">
                <div
                    class="flex items-center text-sm font-semibold text-slate-500 dark:text-slate-400 whitespace-nowrap">
                    <button @click="navigateTo('/')"
                        class="hover:text-blue-600 dark:hover:text-blue-400 transition flex items-center gap-1.5 px-2 py-1 rounded-lg">
                        <i class="fa-solid fa-house"></i>
                    </button>
                    <template x-for="(part, index) in getBreadcrumbs()" :key="index">
                        <div class="flex items-center">
                            <i class="fa-solid fa-chevron-right text-[10px] text-slate-400 mx-1"></i>
                            <button @click="navigateToIndex(index)"
                                class="hover:text-blue-600 dark:hover:text-blue-400 transition px-2 py-1 rounded-lg max-w-[100px] sm:max-w-[150px] truncate"
                                x-text="part"></button>
                        </div>
                    </template>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button @click="fetchFiles(true)" :title="t('refresh')"
                        class="h-8 w-8 flex items-center justify-center text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-lg transition-all active:scale-90 disabled:opacity-50"
                        :disabled="isRefreshing || isLoading">
                        <i class="fa-solid fa-arrows-rotate" :class="isRefreshing ? 'fa-spin text-blue-500' : ''"></i>
                    </button>
                </div>
            </div>
            <div x-show="isRefreshing" x-cloak
                class="h-1 w-full bg-slate-200 dark:bg-slate-800 overflow-hidden absolute z-[40]">
                <div class="h-full bg-blue-500 w-1/3 animate-pulse-fast transform translate-x-[-100%] transition-transform duration-1000"
                    style="animation: indeterminate 1.5s infinite linear;"></div>
            </div>

            <div x-show="currentTab === 'files'"
                class="flex flex-col shrink-0 bg-slate-50/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-white/5 z-30">
                <!-- Search Bar -->
                <div class="px-3 md:px-6 py-3 flex items-center gap-2">
                    <div class="relative group flex-1">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i
                                class="fa-solid fa-magnifying-glass text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                        </div>
                        <input type="text" x-model="searchQuery" @input="currentPage = 1"
                            :placeholder="t('search_placeholder')"
                            class="w-full pl-11 pr-10 py-2.5 rounded-xl bg-white/60 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white dark:focus:bg-slate-800 text-slate-800 dark:text-slate-200 transition-all shadow-sm text-sm">
                        <button x-show="searchQuery" @click="searchQuery = ''; currentPage = 1"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors"
                            x-cloak>
                            <i class="fa-solid fa-circle-xmark text-lg"></i>
                        </button>
                    </div>
                    <button @click="toggleViewMode()"
                        class="p-2.5 px-3 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 bg-white/60 hover:bg-white dark:bg-slate-900/60 dark:hover:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700/50 transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 shrink-0"
                        :title="viewMode === 'list' ? t('view_grid') : t('view_list')">
                        <i class="fa-solid text-lg"
                            :class="viewMode === 'list' ? 'fa-table-cells-large' : 'fa-list'"></i>
                    </button>
                </div>
                <!-- Unified Table Header -->
                <div x-show="files.length > 0 && !isLoading && viewMode === 'list'"
                    class="grid grid-cols-12 gap-4 px-4 md:px-10 py-3 text-[10px] md:text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider border-t border-slate-200/50 dark:border-white/5">
                    <div class="col-span-8 md:col-span-5 flex items-center gap-3 cursor-pointer select-none group"
                        @click="toggleSort('name')">
                        <input type="checkbox" class="w-4 h-4 accent-blue-600 cursor-pointer rounded" @click.stop
                            @change="
                                let pageIds = displayedFiles.filter(f => !f.is_folder).map(f => f.id); 
                                selectedIds = $event.target.checked 
                                    ? [...new Set([...selectedIds, ...pageIds])] 
                                    : selectedIds.filter(id => !pageIds.includes(id))
                            "
                            :checked="displayedFiles.filter(f => !f.is_folder).length > 0 && displayedFiles.filter(f => !f.is_folder).every(f => selectedIds.includes(f.id))">
                        <span x-text="t('name_placeholder')"></span>
                        <i class="fa-solid"
                            :class="sortBy === 'name' ? (sortOrder === 'asc' ? 'fa-sort-up text-blue-500' : 'fa-sort-down text-blue-500') : 'fa-sort opacity-0 group-hover:opacity-40 transition-opacity'"></i>
                    </div>
                    <div class="col-span-3 hidden md:flex items-center gap-1.5 cursor-pointer select-none group"
                        @click="toggleSort('date')">
                        <span x-text="t('date')"></span>
                        <i class="fa-solid"
                            :class="sortBy === 'date' ? (sortOrder === 'asc' ? 'fa-sort-up text-blue-500' : 'fa-sort-down text-blue-500') : 'fa-sort opacity-0 group-hover:opacity-40 transition-opacity'"></i>
                    </div>
                    <div class="col-span-2 hidden md:flex items-center gap-1.5 cursor-pointer select-none group"
                        @click="toggleSort('size')">
                        <span x-text="t('size')"></span>
                        <i class="fa-solid"
                            :class="sortBy === 'size' ? (sortOrder === 'asc' ? 'fa-sort-up text-blue-500' : 'fa-sort-down text-blue-500') : 'fa-sort opacity-0 group-hover:opacity-40 transition-opacity'"></i>
                    </div>
                    <div class="col-span-4 md:col-span-2 text-right md:text-center" x-text="t('actions')"></div>
                </div>
            </div>

            <div class="flex-1 min-h-0 overflow-y-auto p-2 md:p-6 md:pt-2 pb-4 md:pb-6 relative"
                @click.self="closeContextMenu">

                <div x-show="currentTab === 'files'" x-transition.opacity>
                    <div x-show="isLoading" x-cloak class="space-y-4 w-full h-full p-4 animate-pulse">
                        <div class="h-12 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
                        <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-2xl w-full"></div>
                        <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-2xl w-full"></div>
                    </div>

                    <div x-show="!isLoading" x-transition.opacity>



                        <div class="w-full text-left border-collapse relative">
                            <div class="mt-2 pb-10"
                                :class="viewMode === 'list' ? 'space-y-1.5' : 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-1'">
                                <template x-for="file in displayedFiles" :key="file.id">
                                    <div class="contents">
                                        <!-- List View Template -->
                                        <template x-if="viewMode === 'list'">
                                            <div class="group relative grid grid-cols-12 gap-4 px-3 md:px-4 py-2 md:py-3 items-center rounded-2xl hover:bg-white/60 dark:hover:bg-slate-800/50 transition-all border border-transparent"
                                                :class="selectedIds.includes(file.id) ? 'bg-blue-50/80 dark:bg-blue-900/20 border-blue-200 dark:border-blue-500/30' : ''"
                                                @contextmenu.prevent="openContextMenu($event, file)"
                                                x-transition.opacity.duration.300ms>

                                                <div
                                                    class="col-span-8 md:col-span-5 flex items-center gap-3 w-full truncate">
                                                    <div class="w-4 h-4 shrink-0 flex items-center justify-center">
                                                        <input type="checkbox" :value="file.id"
                                                            x-model.number="selectedIds" x-show="!file.is_folder"
                                                            class="w-4 h-4 accent-blue-600 cursor-pointer rounded">
                                                    </div>

                                                    <div class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl shadow-sm shrink-0 cursor-pointer group-hover:scale-105 transition-transform"
                                                        @click="if(file.is_folder) { navigateToFolder(file.filename) } else { showFileInfo(file) }">
                                                        <template x-if="file.is_folder">
                                                            <i
                                                                class="fa-solid fa-folder text-amber-400 text-xl md:text-2xl drop-shadow-sm"></i>
                                                        </template>
                                                        <template x-if="!file.is_folder">
                                                            <div
                                                                class="w-full h-full relative flex items-center justify-center">
                                                                <template x-if="file.has_thumb">
                                                                    <img :src="`/s/${shareToken}/file/${file.id}/thumb`"
                                                                        loading="lazy" alt="thumb"
                                                                        class="w-full h-full object-cover rounded-xl shadow-sm">
                                                                </template>
                                                                <template x-if="!file.has_thumb">
                                                                    <div x-html="getFileTypeData(file.filename).i"
                                                                        class="scale-75 opacity-80"
                                                                        :class="getFileTypeData(file.filename).c.split(' ')[1]">
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="truncate flex-1 cursor-pointer flex flex-col"
                                                        @click="if(file.is_folder) { navigateToFolder(file.filename) } else { showFileInfo(file) }">
                                                        <div class="flex items-center gap-2">
                                                            <p class="text-sm md:text-base font-semibold text-slate-800 dark:text-slate-200 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors"
                                                                x-text="file.filename"></p>
                                                            <span
                                                                class="px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-500/20 text-[9px] font-bold tracking-wider uppercase" x-text="t('public')"></span>
                                                        </div>
                                                        <p class="text-xs text-slate-400 md:hidden mt-0.5"
                                                            x-text="file.is_folder ? t('folder') : formatBytes(file.size)">
                                                        </p>
                                                    </div>
                                                </div>

                                                <div class="hidden md:block col-span-3 text-sm font-medium text-slate-500 dark:text-slate-400"
                                                    x-text="formatDate(file.created_at)"></div>
                                                <div class="hidden md:block col-span-2 text-sm font-medium text-slate-500 dark:text-slate-400"
                                                    x-text="file.is_folder ? t('folder') : formatBytes(file.size)">
                                                </div>

                                                <div class="col-span-4 md:col-span-2 flex justify-end md:justify-center relative"
                                                    @click.outside="if (openMenuId === file.id) openMenuId = null">
                                                    <button
                                                        @click.stop="openMenuId = openMenuId === file.id ? null : file.id"
                                                        class="px-3 py-2 text-slate-400 hover:text-slate-800 dark:hover:text-white rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors focus:outline-none">
                                                        <i class="fa-solid fa-ellipsis-vertical text-lg"></i>
                                                    </button>
                                                    <div x-show="openMenuId === file.id" x-cloak
                                                        x-transition.origin.top.right
                                                        class="glass-menu absolute right-0 top-10 mt-1 w-52 rounded-2xl p-1.5 z-[60] text-sm text-left">
                                                        <button @click="startDownload(file.id); openMenuId = null"
                                                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-600 dark:text-blue-400 font-medium transition-colors"><i
                                                                class="fa-solid fa-download fa-fw"></i> <span
                                                                x-text="t('download')"></span></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Grid View Template -->
                                        <template x-if="viewMode === 'grid'">
                                            <div class="group relative flex flex-col p-4 items-center text-center gap-3 rounded-2xl hover:bg-white/60 dark:hover:bg-slate-800/50 transition-all border border-transparent"
                                                :class="selectedIds.includes(file.id) ? 'bg-blue-50/80 dark:bg-blue-900/20 border-blue-200 dark:border-blue-500/30 shadow-md scale-[1.02]' : 'shadow-sm bg-white/40 dark:bg-slate-800/30 border-slate-200/50 dark:border-slate-700/50'"
                                                @contextmenu.prevent="openContextMenu($event, file)"
                                                x-transition.opacity.duration.300ms>

                                                <div class="absolute top-2 left-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity"
                                                    :class="selectedIds.includes(file.id) ? '!opacity-100' : ''">
                                                    <input type="checkbox" :value="file.id" x-model.number="selectedIds"
                                                        x-show="!file.is_folder"
                                                        class="w-4 h-4 accent-blue-600 cursor-pointer rounded">
                                                </div>

                                                <div class="absolute top-1.5 right-1.5 z-10 opacity-0 group-hover:opacity-100 transition-opacity"
                                                    :class="openMenuId === file.id ? '!opacity-100' : ''"
                                                    @click.outside="if (openMenuId === file.id) openMenuId = null">
                                                    <button
                                                        @click.stop="openMenuId = openMenuId === file.id ? null : file.id"
                                                        class="p-1.5 text-slate-400 hover:text-slate-800 dark:hover:text-white rounded-lg hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors focus:outline-none">
                                                        <i class="fa-solid fa-ellipsis-vertical text-lg"></i>
                                                    </button>
                                                    <div x-show="openMenuId === file.id" x-cloak
                                                        x-transition.origin.top.right
                                                        class="glass-menu absolute right-0 top-8 mt-1 w-52 rounded-2xl p-1.5 z-[60] text-sm text-left">
                                                        <button @click="startDownload(file.id); openMenuId = null"
                                                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-600 dark:text-blue-400 font-medium transition-colors"><i
                                                                class="fa-solid fa-download fa-fw"></i> <span
                                                                x-text="t('download')"></span></button>
                                                    </div>
                                                </div>

                                                <div class="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl shadow-sm shrink-0 cursor-pointer group-hover:scale-105 transition-transform mt-3"
                                                    @click="if(file.is_folder) { navigateToFolder(file.filename) } else { showFileInfo(file) }">
                                                    <template x-if="file.is_folder">
                                                        <i
                                                            class="fa-solid fa-folder text-amber-400 text-4xl md:text-5xl drop-shadow-sm"></i>
                                                    </template>
                                                    <template x-if="!file.is_folder">
                                                        <div
                                                            class="w-full h-full relative flex items-center justify-center">
                                                            <template x-if="file.has_thumb">
                                                                <img :src="`/s/${shareToken}/file/${file.id}/thumb`"
                                                                    loading="lazy" alt="thumb"
                                                                    class="w-full h-full object-cover rounded-2xl shadow-sm">
                                                            </template>
                                                            <template x-if="!file.has_thumb">
                                                                <div x-html="getFileTypeData(file.filename).i"
                                                                    class="scale-[1.5] md:scale-[2] opacity-80"
                                                                    :class="getFileTypeData(file.filename).c.split(' ')[1]">
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>

                                                <div class="w-full flex flex-col items-center gap-1 px-1 cursor-pointer"
                                                    @click="if(file.is_folder) { navigateToFolder(file.filename) } else { showFileInfo(file) }">
                                                    <p class="text-sm font-semibold text-slate-800 dark:text-slate-200 truncate w-full group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors"
                                                        x-text="file.filename" :title="file.filename"></p>
                                                    <p class="text-[10px] md:text-xs text-slate-400 font-medium"
                                                        x-text="file.is_folder ? t('folder') : formatBytes(file.size)">
                                                    </p>
                                                </div>

                                                <span
                                                    class="absolute bottom-2 right-2 px-1.5 py-0.5 rounded border border-emerald-500/20 bg-emerald-500/10 text-emerald-500 text-[8px] font-bold uppercase tracking-wider" x-text="t('public')">Public</span>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <template x-if="files.length === 0 && !isLoading && !isRefreshing">
                                    <div class="py-20 text-center flex flex-col items-center"
                                        @contextmenu.prevent="openContextMenu($event, null)" x-transition.opacity>
                                        <div
                                            class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4">
                                            <i
                                                class="fa-solid fa-folder-open text-5xl text-slate-300 dark:text-slate-600"></i>
                                        </div>
                                        <p class="text-slate-500 dark:text-slate-400 font-medium"
                                            x-text="t('empty_folder')"></p>
                                    </div>
                                </template>

                                <template x-if="files.length > 0 && filteredFiles.length === 0">
                                    <div class="py-16 text-center flex flex-col items-center" x-transition.opacity>
                                        <div
                                            class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4">
                                            <i
                                                class="fa-solid fa-magnifying-glass text-4xl text-slate-300 dark:text-slate-600"></i>
                                        </div>
                                        <p class="text-slate-500 dark:text-slate-400 font-medium"
                                            x-html="t('no_results') + ' &quot;<span x-text=&quot;searchQuery&quot; class=&quot;font-bold&quot;></span>&quot;'">
                                        </p>
                                        <button @click="searchQuery = ''; currentPage = 1"
                                            class="mt-4 text-blue-600 hover:text-blue-500 text-sm font-semibold"
                                            x-text="t('clear_search')"></button>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div x-show="totalPages > 1"
                            class="mt-4 flex flex-col sm:flex-row items-center justify-between gap-4 px-4 py-3 bg-white/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-700/50 backdrop-blur-md"
                            x-cloak>
                            <div class="text-xs md:text-sm text-slate-500 dark:text-slate-400">
                                <span x-text="t('showing')"></span> <span class="font-bold text-slate-700 dark:text-slate-200"
                                    x-text="(currentPage - 1) * itemsPerPage + 1"></span> -
                                <span class="font-bold text-slate-700 dark:text-slate-200"
                                    x-text="Math.min(currentPage * itemsPerPage, filteredFiles.length)"></span>
                                / <span class="font-bold text-slate-700 dark:text-slate-200"
                                    x-text="filteredFiles.length"></span> <span x-text="t('items_suffix')"></span>
                            </div>

                            <div class="flex items-center gap-2">
                                <button
                                    @click="if(currentPage > 1) { currentPage--; $el.closest('.overflow-y-auto').scrollTo({top: 0, behavior: 'smooth'}); }"
                                    :disabled="currentPage === 1"
                                    class="w-9 h-9 flex items-center justify-center rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                                    <i class="fa-solid fa-chevron-left text-xs"></i>
                                </button>

                                <div
                                    class="flex items-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden text-sm">
                                    <input type="number" x-model.number="currentPage"
                                        @change="if(currentPage < 1) currentPage = 1; if(currentPage > totalPages) currentPage = totalPages; $el.closest('.overflow-y-auto').scrollTo({top: 0, behavior: 'smooth'});"
                                        class="w-12 h-9 bg-transparent text-center focus:outline-none font-semibold text-slate-700 dark:text-slate-200 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                                        min="1" :max="totalPages">

                                    <div
                                        class="h-9 flex items-center px-3 text-slate-400 font-medium bg-slate-50 dark:bg-slate-900 border-l border-slate-200 dark:border-slate-700">
                                        / <span x-text="totalPages" class="ml-1"></span>
                                    </div>
                                </div>

                                <button
                                    @click="if(currentPage < totalPages) { currentPage++; $el.closest('.overflow-y-auto').scrollTo({top: 0, behavior: 'smooth'}); }"
                                    :disabled="currentPage === totalPages"
                                    class="w-9 h-9 flex items-center justify-center rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                                    <i class="fa-solid fa-chevron-right text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <footer
                class="flex flex-col md:flex-row items-center justify-between p-3 px-6 border-t border-slate-200 dark:border-white/5 bg-white/20 dark:bg-slate-900/20 text-xs text-slate-500 dark:text-slate-400 mt-auto shrink-0 gap-3 md:gap-0 pb-[calc(1rem+env(safe-area-inset-bottom))] md:pb-3">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="font-medium" x-text="t('online')"></span>
                    </div>
                    <span class="opacity-30">|</span>
                    <span x-text="files.length + ' ' + t('items_count')"></span>
                </div>

                <div class="flex flex-wrap justify-center items-center gap-4 md:gap-6">
                    <div
                        class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700/50">
                        <i class="fa-solid fa-hard-drive text-blue-500"></i>
                        <span
                            class="font-medium text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400"
                            x-text="t('storage_used_here')"></span>
                        <span class="text-slate-700 dark:text-slate-200 font-bold"
                            x-text="formatBytes(totalSize)"></span>
                    </div>
                    <div class="flex items-center gap-1.5 hover:text-slate-900 dark:hover:text-white transition-colors">
                        <a href="https://github.com/dabeecao/telecloud-go" target="_blank"
                            class="flex items-center gap-1.5">
                            <i class="fa-brands fa-github text-sm"></i>
                            <span>GitHub</span>
                        </a>
                    </div>
                    <p class="font-medium">TeleCloud <span class="font-bold text-slate-700 dark:text-slate-300"
                            x-text="TeleCloud.version"></span> &copy; 2026 <span
                            class="text-blue-600 dark:text-blue-400">@dabeecao</span></p>
                </div>
            </footer>
        </main>
    </div>



    <div x-show="selectedIds.length > 0" x-cloak
        class="fixed bottom-[calc(5rem+env(safe-area-inset-bottom))] md:bottom-8 left-1/2 -translate-x-1/2 glass-menu px-3 py-3 rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.2)] dark:shadow-[0_20px_40px_rgba(0,0,0,0.8)] flex items-center gap-2 md:gap-6 z-[55] md:z-50 border border-slate-200 dark:border-slate-700/50"
        x-transition.scale.origin.bottom>
        <span class="text-sm font-bold bg-blue-600 text-white px-3 py-1.5 rounded-full shadow-inner"
            x-text="selectedIds.length"></span>
        <div class="h-6 w-px bg-slate-300 dark:bg-slate-600"></div>
        <div class="flex items-center gap-1 md:gap-4 text-sm font-semibold text-slate-600 dark:text-slate-300">
            <button @click="downloadSelectedBatch" :title="t('download')"
                class="p-2.5 sm:px-3 sm:py-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-blue-600 dark:hover:text-blue-400 transition flex items-center gap-2">
                <i class="fa-solid fa-download text-lg sm:text-base"></i>
                <span class="hidden sm:block" x-text="t('download')"></span>
            </button>
        </div>
        <button @click="selectedIds = []"
            class="ml-1 p-2 w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 rounded-full transition-colors"><i
                class="fa-solid fa-xmark"></i></button>
    </div>

    <div x-show="isPreparingDownload" x-cloak
        class="fixed inset-0 z-[400] flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm"
        x-transition.opacity>
        <i class="fa-solid fa-cloud-arrow-down text-6xl text-blue-400 mb-6 animate-bounce"></i>
        <div class="text-white text-xl font-bold mb-2 text-center px-4" x-text="t('connecting_tg')"></div>
        <div class="text-white/70 text-sm mb-6" x-text="t('wait_msg')"></div>
        <div class="w-48 h-1.5 bg-slate-700 rounded-full overflow-hidden">
            <div class="h-full bg-blue-500 w-1/3 animate-pulse-fast transform translate-x-[-100%]"
                style="animation: indeterminate 1.5s infinite linear;"></div>
        </div>
    </div>

    <!-- Batch Download Progress -->
    <div x-show="batchDownload.active" x-cloak
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] w-[90%] max-w-sm bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-white/5 p-4 animate-modal-in backdrop-blur-md bg-opacity-90 dark:bg-opacity-90">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-cloud-arrow-down text-blue-600 dark:text-blue-400 text-xl animate-bounce"></i>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-sm font-bold text-slate-900 dark:text-white" x-text="t('batch_downloading')"></span>
                    <span class="text-xs font-bold text-blue-600 dark:text-blue-400" x-text="batchDownload.current + ' / ' + batchDownload.total"></span>
                </div>
                <div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-600 transition-all duration-500 ease-out" 
                         :style="`width: ${(batchDownload.current / batchDownload.total) * 100}%` "></div>
                </div>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-1 truncate" x-text="t('batch_dl_desc')"></p>
            </div>
        </div>
    </div>

    <div x-show="toastModal.show" x-cloak
        class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
        x-transition.opacity>
        <div @click.outside="if(!toastModal.persistent) toastModal.show = false"
            class="glass-menu w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 relative flex flex-col items-center text-center">

            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"
                :class="toastModal.type === 'error' ? 'bg-red-100 text-red-500 dark:bg-red-500/20' : 'bg-emerald-100 text-emerald-500 dark:bg-emerald-500/20'">
                <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>
            </div>

            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"
                x-text="toastModal.type === 'error' ? t('failure') : t('success')"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>

            <button x-show="!toastModal.persistent" @click="toastModal.show = false"
                class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'"
                x-text="t('close')">
            </button>
        </div>
    </div>


    </template>
    </div>
    </div>
    </div>

</body>

</html>
