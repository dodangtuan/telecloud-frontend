<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ .filename }} - TeleCloud</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">
    <link rel="stylesheet" href="/static/css/fontawesome.min.css?v={{ .version }}">
    
    <link rel="stylesheet" href="/static/css/plyr.min.css?v={{ .version }}" />
    <script src="/static/js/plyr.polyfilled.js?v={{ .version }}"></script>
    <link rel="stylesheet" href="/static/css/prism.min.css?v={{ .version }}" />
    <script src="/static/js/prism.min.js?v={{ .version }}"></script>
    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">
    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script defer src="/static/js/alpine.min.js?v={{ .version }}"></script>

    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Download file {{ .filename }} from TeleCloud OS">
    <meta property="og:title" content="{{ .filename }} - TeleCloud">
    <meta property="og:description" content="Size: {{ .formatted_size }} - Created: {{ .created_at }}">
    <meta property="og:type" content="website">
    {{ if .has_thumb }}
    <meta property="og:image" content="/s/{{ .token }}/thumb">
    <meta name="twitter:card" content="summary_large_image">
    {{ else }}
    <meta property="og:image" content="/static/favicon.ico">
    <meta name="twitter:card" content="summary">
    {{ end }}
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 relative overflow-x-hidden transition-colors duration-500" 
      data-theme="system"
      x-data="{ 
        lang: TeleCloud.lang,
        typeKey: '',
        typeExt: '',
        t(key) { return TeleCloud.t(key, {}, this.lang); },
        async toggleLang() { this.lang = await TeleCloud.toggleLang(); },
        async setLang(code) { this.lang = await TeleCloud.setLang(code); },
        init() {
            window.addEventListener('tc-translations-loaded', (e) => {
                this.lang = '';
                this.$nextTick(() => { this.lang = e.detail.lang; });
            });
            window.addEventListener('online', () => this.showToast(this.t('you_are_online'), 'success'));
            window.addEventListener('offline', () => this.showToast(this.t('you_are_offline'), 'error', 0));
            TeleCloud.initTheme('system');
        },
        isMedia: false,
        showTextPreviewPrompt: false,
        tooLarge: false,
        isPreviewLoading: false,
        textPreviewHtml: '',
        toastModal: { show: false, message: '', type: 'success', persistent: false },
        toastTimeout: null,
        showToast(msg, type = 'success', duration = 3500) {
            if (this.toastTimeout) clearTimeout(this.toastTimeout);
            this.toastModal = { show: true, message: msg, type: type, persistent: duration === 0 };
            if (duration > 0) {
                this.toastTimeout = setTimeout(() => { this.toastModal.show = false; }, duration);
            }
        },
      }">
    
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div id="download-overlay" class="fixed inset-0 z-[500] hidden flex-col items-center justify-center bg-slate-900/70 backdrop-blur-md transition-opacity duration-300 opacity-0">
        <i class="fa-solid fa-cloud-arrow-down text-6xl text-blue-400 mb-6 animate-bounce"></i>
        <div class="text-white text-2xl font-bold mb-2 text-center px-4" x-text="t('preparing_file')"></div>
        <div class="text-white/70 text-sm mb-6" x-text="t('wait_tg')"></div>
        <div class="w-48 h-1.5 bg-slate-700 rounded-full overflow-hidden shadow-inner">
            <div class="h-full bg-blue-500 w-1/3 transform translate-x-[-100%]" style="animation: indeterminate 1.5s infinite linear;"></div>
        </div>
    </div>

    <div class="min-h-screen w-full flex items-center justify-center py-12 px-4 relative z-10">
        
        <main id="main-card" class="w-full max-w-lg sm:max-w-xl lg:max-w-2xl xl:max-w-3xl glass-panel rounded-[2.5rem] lg:rounded-[3.5rem] xl:rounded-[4.5rem] p-6 sm:p-10 lg:p-16 animate-fade-in-up transition-all duration-500">
            
            <div class="flex items-center justify-between mb-8 opacity-80 relative z-[200]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i class="fa-solid fa-cloud text-xl text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white">TeleCloud</h1>
                </div>
                <!-- Language Dropdown -->
                <div class="relative z-[110]" x-data="{ open: false }">
                    <button @click="open = !open" @click.outside="open = false"
                        class="h-9 px-2.5 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-xl transition-colors shadow-sm border border-slate-200 dark:border-slate-700/50">
                        <i class="fa-solid fa-earth-americas text-base"></i>
                        <span class="text-xs font-bold uppercase" x-text="lang"></span>
                    </button>
                    <div x-show="open" x-cloak
                        class="absolute top-11 right-0 w-32 glass-menu rounded-xl shadow-xl border border-white/20 p-1 z-[1000]"
                        x-transition:enter="transition ease-out duration-100"
                        x-transition:enter-start="transform opacity-0 scale-95"
                        x-transition:enter-end="transform opacity-100 scale-100">
                        <template x-for="l in TeleCloud.availableLangs" :key="l.code">
                            <button @click="setLang(l.code); open = false"
                                class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-between"
                                :class="lang === l.code ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'">
                                <span x-text="l.name"></span>
                                <span x-text="l.flag"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>

            <div id="main-content-grid" class="flex flex-col gap-8 w-full">
                
                <div id="info-section" class="flex flex-col items-center text-center w-full transition-all duration-500">
                    <div id="file-icon-container" class="w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-inner mb-6 transition-all duration-300 overflow-hidden relative">
                        <template x-if="{{ .has_thumb }}">
                            <img src="/s/{{ .token }}/thumb" class="w-full h-full object-cover absolute inset-0 z-10" onerror="this.style.display='none'">
                        </template>
                        <i class="fa-solid fa-file text-5xl relative z-0"></i>
                    </div>

                    <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white break-all line-clamp-3 mb-2 transition-all duration-300" id="raw-filename">{{ .filename }}</h2>
                    <p id="file-type-name" class="text-sm font-semibold text-blue-600 dark:text-blue-400 mb-6 uppercase tracking-wider transition-all duration-300" 
                        x-text="t(typeKey) + (typeExt ? ' (' + typeExt + ')' : '')"></p>

                    <div class="w-full bg-white/40 dark:bg-slate-900/40 rounded-2xl p-4 border border-slate-200/50 dark:border-slate-700/50 space-y-3 text-sm transition-all duration-300">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-500 dark:text-slate-400" x-text="t('size') + ':'"></span>
                            <span class="font-bold text-slate-800 dark:text-slate-200" x-text="TeleCloud.formatBytes({{ .size }})"></span>
                        </div>
                        <div class="h-px w-full bg-slate-200/50 dark:bg-slate-700/50"></div>
                        <div class="flex justify-between items-center">
                            <span x-text="t('date') + ':'"></span>
                            <span class="font-bold text-slate-800 dark:text-slate-200" x-text="TeleCloud.formatDate('{{ .created_at }}', lang)"></span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4 w-full justify-center">
                    
                    <div id="media-preview-container" x-show="isMedia" x-cloak class="w-full mb-2 flex-col items-center justify-center rounded-[1.5rem] p-1.5 glass-panel shadow-md transition-all">
                        <!-- Image/Video/Audio injected here -->
                        <div id="media-injected-content"></div>

                        <!-- Text Preview Prompt (Reactive) -->
                        <div x-show="showTextPreviewPrompt" class="p-4 w-full flex flex-col items-center gap-4 animate-fade-in">
                            <button @click="loadTextPreview" :disabled="isPreviewLoading"
                                class="px-6 py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 hover:bg-blue-500 hover:text-white transition-all font-bold text-sm flex items-center gap-2 border border-slate-200 dark:border-slate-700 shadow-sm active:scale-95">
                                <i class="fa-solid" :class="isPreviewLoading ? 'fa-circle-notch fa-spin' : 'fa-eye'"></i>
                                <span x-text="isPreviewLoading ? t('loading') : t('load_preview')"></span>
                            </button>
                            <p class="text-[10px] opacity-40 italic" x-text="t('preview_manual')"></p>
                        </div>

                        <!-- Text Preview Content -->
                        <div x-show="textPreviewHtml" x-html="textPreviewHtml" class="w-full animate-fade-in"></div>
                    </div>

                    <div x-show="tooLarge" x-cloak class="w-full mb-2">
                        <div class="w-full p-6 flex flex-col items-center justify-center bg-red-50 dark:bg-red-500/10 rounded-2xl border border-dashed border-red-200 dark:border-red-500/30 animate-fade-in">
                            <i class="fa-solid fa-file-circle-exclamation text-4xl text-red-400 mb-3"></i>
                            <p class="text-sm text-red-600 dark:text-red-400 text-center font-bold" x-text="t('preview_blocked')"></p>
                        </div>
                    </div>
            
                    <form method="POST" action="/s/{{ .token }}/dl" target="hidden_download_iframe" id="download-form" class="w-full">
                        <button type="submit" class="group relative w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg shadow-[0_10px_20px_rgba(37,99,235,0.3)] transition-all active:scale-[0.98] overflow-hidden">
                            <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            <i class="fa-solid fa-cloud-arrow-down text-2xl animate-bounce"></i>
                            <span x-text="t('download_now')"></span>
                        </button>
                    </form>

                    <iframe name="hidden_download_iframe" class="hidden"></iframe>
                    
                    <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-2 flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-shield-halved text-emerald-500 text-sm"></i>
                        <span x-text="t('safe_msg')"></span>
                    </p>
                </div>

            </div>

            <footer class="mt-10 text-center relative z-10 opacity-60 hover:opacity-100 transition-opacity">
                <div class="flex items-center justify-center gap-4 mb-2">
                    <a href="https://github.com/dabeecao/telecloud-go" target="_blank" class="text-slate-500 hover:text-blue-500 transition-colors">
                        <i class="fa-brands fa-github text-lg"></i>
                    </a>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Powered by <span class="font-bold text-blue-500">TeleCloud OS</span> &copy; 2026 <span class="text-blue-600 dark:text-blue-400">@dabeecao</span></p>
            </footer>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawFilename = document.getElementById('raw-filename').innerText.trim();
            const rawSize = parseInt('{{ .size }}') || 0;
            const rawDate = '{{ .created_at }}';

            // Size is now handled reactively by Alpine via TeleCloud.formatBytes({{ .size }})
            // Date is now handled reactively by Alpine via TeleCloud.formatDate('{{ .created_at }}', lang)

            function applyFileTypeStyling(filename, scope) {
                const container = document.getElementById('file-icon-container');
                const result = TeleCloud.getFileTypeData(filename);
                
                container.className = 'w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-inner mb-6 transition-all duration-300 ' + result.c;
                container.innerHTML = result.i.replace('text-2xl', 'text-5xl');
                
                // Update Alpine state
                scope.typeKey = result.n;
                scope.typeExt = result.ext || '';
            }

            // Get Alpine scope to update reactive properties
            const alpineScope = Alpine.$data(document.body);
            applyFileTypeStyling(rawFilename, alpineScope);

            const ext = rawFilename.split('.').pop().toLowerCase();
            const previewContainer = document.getElementById('media-preview-container');
            const streamUrl = '/s/{{ .token }}/stream';
            const thumbUrl = '/s/{{ .token }}/thumb'; 
            const hasThumb = '{{ .has_thumb }}' === 'true' || '{{ .has_thumb }}' === '1';

            const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'heic', 'heif'];
            const videoExts = ['mp4', 'webm', 'ogg', 'mov', 'mkv', 'ogv', '3gp', 'flv', 'wmv'];
            const audioExts = ['mp3', 'wav', 'ogg', 'm4a', 'flac', 'opus', 'oga', 'aac', 'm4b'];
            const mimeTypes = { 
                'mp4': 'video/mp4', 'webm': 'video/webm', 'ogg': 'video/ogg', 'ogv': 'video/ogg',
                'mov': 'video/mp4', 'mkv': 'video/webm', 'mp3': 'audio/mpeg', 'wav': 'audio/wav', 
                'flac': 'audio/flac', 'm4a': 'audio/mp4', 'opus': 'audio/ogg', 'oga': 'audio/ogg',
                'aac': 'audio/aac', 'm4b': 'audio/mp4'
            };
            const textExts = ['txt', 'md', 'log', 'json', 'js', 'py', 'go', 'html', 'css', 'yml', 'yaml', 'sql', 'sh', 'conf', 'ini', 'c', 'cpp', 'h', 'hpp', 'cs', 'java', 'rb', 'rs', 'swift'];
            const langMap = {
                'js': 'javascript', 'json': 'json', 'py': 'python', 'go': 'go', 
                'html': 'markup', 'css': 'css', 'yml': 'yaml', 'yaml': 'yaml',
                'sql': 'sql', 'sh': 'bash', 'md': 'markdown', 'c': 'clike', 'cpp': 'clike',
                'h': 'clike', 'hpp': 'clike', 'cs': 'clike', 'java': 'java', 'rb': 'ruby',
                'rs': 'rust', 'swift': 'swift'
            };

            let isMedia = false;
            let playerTarget = null;

            let injectedHtml = '';

            if (imgExts.includes(ext)) {
                if (rawSize > 10 * 1024 * 1024) {
                    alpineScope.tooLarge = true;
                    if (hasThumb) {
                        injectedHtml = '<img src="' + thumbUrl + '" alt="' + rawFilename + '" class="max-h-72 object-contain rounded-[1rem] w-full shadow-lg opacity-60 blur-[2px] transition-all hover:blur-0 cursor-zoom-in" onerror="this.style.display=\'none\'">';
                        isMedia = true;
                        alpineScope.isMedia = true;
                    }
                } else {
                    injectedHtml = '<img src="' + streamUrl + '" alt="' + rawFilename + '" class="max-h-72 object-contain rounded-[1rem] w-full shadow-lg">';
                    isMedia = true;
                    alpineScope.isMedia = true;
                }
            } else if (videoExts.includes(ext)) {
                const typeAttr = mimeTypes[ext] || 'video/mp4';
                const posterAttr = hasThumb ? 'data-poster="' + thumbUrl + '"' : '';
                injectedHtml = '<div class="w-full relative z-20 rounded-[1rem] bg-black shadow-md"><video id="tele-player" playsinline controls preload="none" ' + posterAttr + '><source src="' + streamUrl + '" type="' + typeAttr + '"></video></div>';
                isMedia = true;
                alpineScope.isMedia = true;
                playerTarget = '#tele-player';
            } else if (audioExts.includes(ext)) {
                const typeAttr = mimeTypes[ext] || 'audio/mpeg';
                const coverHtml = hasThumb ? '<img src="' + thumbUrl + '" class="w-48 h-48 mx-auto rounded-2xl mb-4 object-cover shadow-md">' : '<div class="w-48 h-48 mx-auto rounded-2xl mb-4 flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm"><i class="fa-solid fa-music text-6xl text-slate-300 dark:text-slate-500"></i></div>';
                injectedHtml = '<div class="w-full relative z-20 rounded-[1rem] p-2 sm:p-4 glass-panel shadow-inner">' + coverHtml + '<audio id="tele-player" controls preload="none"><source src="' + streamUrl + '" type="' + typeAttr + '"></audio></div>';
                isMedia = true;
                alpineScope.isMedia = true;
                playerTarget = '#tele-player';
            } else if (textExts.includes(ext)) {
                alpineScope.isMedia = true;
                alpineScope.showTextPreviewPrompt = true;

                alpineScope.loadTextPreview = function() {
                    if (this.isPreviewLoading) return;
                    this.isPreviewLoading = true;
                    
                    fetch(streamUrl, { headers: { 'Range': 'bytes=0-262144' } })
                        .then(r => {
                            if (!r.ok && r.status !== 206) throw new Error("Failed to fetch");
                            return r.text();
                        })
                        .then(content => {
                            const langClass = 'language-' + (langMap[ext] || 'none');
                            const escaped = content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            this.textPreviewHtml = '<div class="w-full max-h-[60vh] overflow-auto rounded-xl bg-slate-900 text-left relative"><pre class="!m-0 !p-4 !bg-transparent"><code class="' + langClass + '">' + escaped + '</code></pre></div>';
                            this.showTextPreviewPrompt = false;
                            this.$nextTick(() => {
                                if (window.Prism) Prism.highlightAllUnder(document.querySelector('#media-preview-container'));
                            });
                        })
                        .catch(err => {
                            console.error("Preview error:", err);
                            this.textPreviewHtml = '<div class="p-6 text-center text-red-500"><i class="fa-solid fa-circle-exclamation text-4xl mb-3"></i><p class="text-sm">' + TeleCloud.t('preview_error') + '</p></div>';
                            this.showTextPreviewPrompt = false;
                        })
                        .finally(() => {
                            this.isPreviewLoading = false;
                        });
                };
                isMedia = true;
            }

            if (isMedia) {
                const mediaInjectedContent = document.getElementById('media-injected-content');
                if (injectedHtml) {
                    mediaInjectedContent.innerHTML = injectedHtml;
                }
                
                const mainCard = document.getElementById('main-card');
                const contentGrid = document.getElementById('main-content-grid');
                const iconContainer = document.getElementById('file-icon-container');
                
                iconContainer.classList.remove('w-24', 'h-24', 'mb-6', 'rounded-[2rem]');
                iconContainer.classList.add('w-16', 'h-16', 'mb-4', 'rounded-[1.2rem]');
                
                const icon = iconContainer.querySelector('i');
                if (icon) { 
                    icon.classList.remove('text-5xl'); 
                    icon.classList.add('text-3xl'); 
                }
                
                const filenameEl = document.getElementById('raw-filename');
                filenameEl.classList.remove('text-2xl', 'sm:text-3xl', 'mb-2');
                filenameEl.classList.add('text-xl', 'mb-1');
                
                const typeEl = document.getElementById('file-type-name');
                typeEl.classList.remove('mb-6', 'text-sm');
                typeEl.classList.add('mb-4', 'text-xs');
                
                const detailsBox = document.querySelector('#file-type-name').nextElementSibling;
                if (detailsBox && detailsBox.tagName === 'DIV') { 
                    detailsBox.classList.remove('p-4', 'space-y-3'); 
                    detailsBox.classList.add('p-3', 'space-y-2'); 
                }
                
                if (audioExts.includes(ext)) { 
                    mainCard.classList.remove('max-w-lg', 'sm:max-w-xl', 'lg:max-w-2xl', 'xl:max-w-3xl'); 
                    mainCard.classList.add('max-w-lg', 'sm:max-w-xl'); 
                    contentGrid.className = "flex flex-col gap-6 w-full"; 
                } else { 
                    mainCard.classList.remove('max-w-lg', 'sm:max-w-xl', 'lg:max-w-2xl', 'xl:max-w-3xl'); 
                    mainCard.classList.add('max-w-4xl', 'lg:max-w-6xl', '2xl:max-w-7xl'); 
                    contentGrid.className = "grid grid-cols-1 lg:grid-cols-[1fr_1.5fr] gap-8 w-full items-center"; 
                }

                if (playerTarget) { 
                    setTimeout(() => { 
                        const isAudio = audioExts.includes(ext);
                        const plyrOpts = isAudio
                            ? { controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'settings'], settings: ['speed'], speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] } }
                            : { ratio: '16:9', controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'settings', 'pip', 'fullscreen'], settings: ['speed'], speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] } };
                        new Plyr(playerTarget, plyrOpts);
                    }, 50); 
                }
            }
            
            const form = document.getElementById('download-form');
            const overlay = document.getElementById('download-overlay');
            
            form.addEventListener('submit', () => {
                overlay.classList.remove('hidden'); 
                overlay.classList.add('flex');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                
                document.cookie = "dl_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                
                let checkCookie = setInterval(() => {
                    if (document.cookie.includes('dl_started=1')) {
                        clearInterval(checkCookie); 
                        overlay.classList.add('opacity-0');
                        setTimeout(() => { 
                            overlay.classList.add('hidden'); 
                            overlay.classList.remove('flex'); 
                        }, 300); 
                        document.cookie = "dl_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                    }
                }, 500);
                
                setTimeout(() => { 
                    clearInterval(checkCookie); 
                    overlay.classList.add('opacity-0'); 
                    setTimeout(() => { 
                        overlay.classList.add('hidden'); 
                        overlay.classList.remove('flex'); 
                    }, 300); 
                }, 15000);
            });
        });
    </script>
    <div x-show="toastModal.show" x-cloak
        class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
        x-transition.opacity>
        <div @click.outside="if(!toastModal.persistent) toastModal.show = false"
            class="glass-menu w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 relative flex flex-col items-center text-center">

            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"
                :class="toastModal.type === 'error' ? 'bg-red-100 text-red-500 dark:bg-red-500/20' : 'bg-emerald-100 text-emerald-500 dark:bg-emerald-500/20'">
                <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>
            </div>

            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"
                x-text="toastModal.type === 'error' ? t('failure') : t('success')"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>

            <button x-show="!toastModal.persistent" @click="toastModal.show = false"
                class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'"
                x-text="t('close')">
            </button>
        </div>
    </div>
</body>
</html>
